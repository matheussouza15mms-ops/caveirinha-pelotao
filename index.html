<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caveirinha App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <button id="toggleSidebar" class="toggle-btn" aria-label="Expandir ou retrair menu">☰</button>
      <nav class="menu">
        <button class="menu-item active" data-screen="quadro">
          <span class="menu-icon icon-quadro" aria-hidden="true"></span>
          <span class="label">Quadro Organizacional</span>
        </button>
        <button class="menu-item" data-screen="efetivo">
          <span class="menu-icon icon-efetivo" aria-hidden="true"></span>
          <span class="label">Efetivo</span>
        </button>
      </nav>
      <button id="searchToggle" class="search-toggle">
        <span class="menu-icon icon-search" aria-hidden="true"></span>
        <span class="label">Pesquisar Militar</span>
      </button>
      <div id="searchPanel" class="search-panel" aria-hidden="true">
        <input
          id="searchInput"
          type="search"
          placeholder="Buscar por nome ou função"
          autocomplete="off"
        />
        <div id="searchResults" class="search-results"></div>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <div class="app-header">
          <div class="app-brand-logo" aria-label="Logo do pelotão"></div>
          <div class="app-brand-text">
            <h1>Caveirinha do Pelotão</h1>
            <p>PELOPES</p>
          </div>
        </div>
        <h2 id="screenTitle">Quadro Organizacional</h2>
      </header>

      <section id="quadroScreen" class="screen active">
        <div class="quadro-layout">
          <div class="tabs-vertical" id="tabsContainer"></div>
          <div class="cards-area" id="cardsArea"></div>
        </div>
      </section>

      <section id="efetivoScreen" class="screen">
        <div class="efetivo-summary">
          <article class="efetivo-kpi">
            <p>Total no pelotão</p>
            <strong id="kpiTotalPelotao">0</strong>
          </article>
          <article class="efetivo-kpi">
            <p>Em forma</p>
            <strong id="kpiEmForma">0</strong>
          </article>
          <article class="efetivo-kpi">
            <p>Na falta ou destinos</p>
            <strong id="kpiDestinos">0</strong>
            <small id="kpiBaixados">Baixados: 0</small>
          </article>
        </div>

        <div class="efetivo-table-wrap">
          <table class="efetivo-table">
            <thead>
              <tr>
                <th>Check</th>
                <th>Militar</th>
                <th>Situação</th>
              </tr>
            </thead>
            <tbody id="efetivoTableBody"></tbody>
          </table>
        </div>
      </section>

      <section id="fichaScreen" class="screen">
        <button id="backToQuadro" class="back-btn">← Voltar ao Quadro</button>
        <div class="ficha-header">
          <img id="fichaFoto" src="" alt="Foto do militar" />
          <div>
            <h2 id="fichaNome"></h2>
            <p id="fichaFuncao"></p>
          </div>
        </div>
        <div class="ficha-actions">
          <button id="fichaDadosBtn" class="ficha-action">Dados</button>
          <button class="ficha-action">TAF</button>
          <button class="ficha-action">TAT</button>
          <button id="fichaFoBtn" class="ficha-action">Fatos Observados</button>
        </div>
      </section>
    </main>
  </div>

  <div id="dadosModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="dadosModalTitle">
      <div class="modal-header">
        <h3 id="dadosModalTitle">Dados do Militar</h3>
        <button id="dadosModalClose" class="modal-close" aria-label="Fechar janela">×</button>
      </div>
      <div id="dadosModalBody" class="dados-grid"></div>
    </div>
  </div>

  <div id="foModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-card fo-modal-card" role="dialog" aria-modal="true" aria-labelledby="foModalTitle">
      <div class="modal-header">
        <h3 id="foModalTitle">Fatos Observados</h3>
        <button id="foModalClose" class="modal-close" aria-label="Fechar janela">×</button>
      </div>

      <div class="fo-modal-content">
        <div class="fo-topbar">
          <div class="fo-tabs">
            <button id="foTabPlus" class="fo-tab-btn active" data-tipo="FO+">FO +</button>
            <button id="foTabMinus" class="fo-tab-btn" data-tipo="FO-">FO -</button>
          </div>
          <button id="foNovoBtn" class="fo-new-btn">Registrar FO</button>
        </div>

        <div class="fo-table-wrap">
          <table class="fo-table">
            <thead>
              <tr>
                <th>Fato Observado</th>
                <th>Quem registrou</th>
                <th>Data</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="foTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="foEditorModal" class="modal-overlay" aria-hidden="true">
    <div class="modal-card fo-editor-card" role="dialog" aria-modal="true" aria-labelledby="foEditorTitle">
      <div class="modal-header">
        <h3 id="foEditorTitle">Registrar FO</h3>
        <button id="foEditorClose" class="modal-close" aria-label="Fechar janela">×</button>
      </div>

      <form id="foEditorForm" class="fo-form">
        <label>
          Fato observado
          <textarea id="foDescricaoInput" rows="4" required></textarea>
        </label>
        <label>
          Quem registrou
          <input id="foAutorInput" type="text" required />
        </label>
        <label>
          Data
          <input id="foDataInput" type="date" required />
        </label>
        <div class="fo-form-actions">
          <button type="button" id="foEditorCancel" class="ficha-action">Cancelar</button>
          <button type="submit" class="fo-save-btn">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="services/api.js"></script>
  <script src="app.js"></script>
</body>
</html>
